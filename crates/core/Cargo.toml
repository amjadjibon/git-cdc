[package]
name = "git-cdc-core"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
blake3 = { version = "1", features = ["std"] }
clap = { version = "4.6.2", features = ["derive"] }
fastcdc = "4.0.1"
serde = { version = "1.0.228", features = ["derive"] }

[dev-dependencies]
assert_cmd = "2.2.2"
tempfile = "3.27.0"
